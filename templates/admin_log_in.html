<style>

/* 🌌 BACKGROUND */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #0f172a, #1e3a8a, #3b82f6);
}

/* ✨ ANIMATED GRADIENT OVERLAY */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(59,130,246,0.2), transparent 70%);
    animation: moveBg 20s linear infinite;
    z-index: 0;
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    50% { transform: translate(-25%, -25%); }
    100% { transform: translate(0,0); }
}

/* 🌊 ADVANCED BUBBLES */
.bubble {
    position: absolute;
    bottom: -120px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(59,130,246,0.3));
    box-shadow: 0 0 15px rgba(147,197,253,0.6);
    animation: rise linear infinite;
    pointer-events: none;
    z-index: 1;
}

@keyframes rise {
    0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
    }
    20% { opacity: 1; }
    100% {
        transform: translateY(-120vh) translateX(40px) scale(1.2);
        opacity: 0;
    }
}

/* 💎 GLASS CARD */
.login-container {
    position: relative;
    z-index: 2;
    width: 360px;
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.12);
    box-shadow: 0 15px 50px rgba(0,0,0,0.4);
    color: #1e293b;
    text-align: center;

    margin: auto;
    top: 50%;
    transform: translateY(-50%) scale(0.9);

    animation: popIn 1s ease forwards;
}

@keyframes popIn {
    to {
        transform: translateY(-50%) scale(1);
    }
}

/* TITLE */
h2 {
    color: #ffffff;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 14px;
    margin-bottom: 20px;
    color: #cbd5e1;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    outline: none;
    background: rgba(255,255,255,0.9);
}

/* BUTTON */
button {
    width: 250px;
    margin: 15px auto;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #1e3a8a, #3b82f6);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #93c5fd;
    color: #1e293b;
}

/* LOADING SPINNER */
.spinner {
    width: 20px;
    height: 20px;
    border: 3px solid #ccc;
    border-top: 3px solid #1e3a8a;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 10px auto;
    display: none;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* MESSAGES */
.error {
    color: #f87171;
    display: none;
}

.success {
    color: #4ade80;
    display: none;
}

/* GOOGLE BUTTON */
#googleSignIn { display: flex; justify-content: center; margin-top: 10px; }

</style>
</head>

    for (let i = 0; i < 30; i++) {
        let bubble = document.createElement("div");
        bubble.classList.add("bubble");

        let size = Math.random() * 60 + 10;

        bubble.style.width = size + "px";
        bubble.style.height = size + "px";
        bubble.style.left = Math.random() * 100 + "%";

        bubble.style.animationDuration = (Math.random() * 6 + 4) + "s";
        bubble.style.animationDelay = Math.random() * 5 + "s";

        document.body.appendChild(bubble);
    }
}

    });

    google.accounts.id.renderButton(
        document.getElementById("googleSignIn"),
        { theme: "outline", size: "large", width: 250 }
    );
});
</script>

function handleCredentialResponse(response) {
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "/google-auth";

    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "token";
    input.value = response.credential;

    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
}
