<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Distribution Schedule & Delivery System</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

header{
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    width:90%;
    margin:auto;
    margin-top:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h2{
    margin-top:0;
}

input{
    padding:8px;
    margin:5px;
}

button{
    padding:8px 12px;
    border:none;
    background:#3498db;
    color:white;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th, td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#3498db;
    color:white;
}

.status-delivered{
    color:green;
    font-weight:bold;
}

.status-pending{
    color:orange;
    font-weight:bold;
}

.report{
    background:#ecf0f1;
    padding:10px;
    border-radius:5px;
}

iframe{
    width:100%;
    height:400px;
    border:0;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>Distribution Schedule & Delivery Management</h1>
</header>

<div class="container">

<!-- CREATE SCHEDULE -->
<div class="card">
<h2>Create Distribution Schedule</h2>

<input type="date" id="date">
<input type="text" id="location" placeholder="Location">
<input type="number" id="tons" placeholder="Tons to Deliver">
<input type="number" id="cost" placeholder="Cost">

<button onclick="addSchedule()">Add Schedule</button>
</div>

<!-- TABLE -->
<div class="card">
<h2>Distribution Records</h2>

<table id="table">
<thead>
<tr>
<th>Date</th>
<th>Location</th>
<th>Tons Planned</th>
<th>Tons Distributed</th>
<th>Cost</th>
<th>Status</th>
<th>Update</th>
</tr>
</thead>

<tbody></tbody>
</table>
</div>

<!-- MAP SECTION -->
<div class="card">
<h2>Delivery Map Location</h2>
<---------
<iframe
src="https://www.google.com/maps?q=Iloilo+City+Philippines&output=embed"
loading="lazy">
</iframe>

</div>

<!-- REPORT -->
<div class="card">
<h2>Generate Report</h2>

<button onclick="generateReport()">Generate</button>

<div class="report" id="report"></div>
</div>

</div>

<script>

let schedules = [];

function addSchedule(){

let date = document.getElementById("date").value;
let location = document.getElementById("location").value;
let tons = document.getElementById("tons").value;
let cost = document.getElementById("cost").value;

if(date=="" || location=="" || tons=="" || cost==""){
alert("Please fill all fields");
return;
}

let schedule = {
date,
location,
tons: Number(tons),
distributed:0,
cost:Number(cost),
status:"Pending"
};

schedules.push(schedule);

renderTable();

}

function renderTable(){

let tbody = document.querySelector("#table tbody");
tbody.innerHTML="";

schedules.forEach((s,index)=>{

let row = `
<tr>
<td>${s.date}</td>
<td>${s.location}</td>
<td>${s.tons}</td>
<td>${s.distributed}</td>
<td>$${s.cost}</td>
<td class="${s.status=='Delivered'?'status-delivered':'status-pending'}">${s.status}</td>
<td>
<input type="number" id="dist${index}" placeholder="tons">
<button onclick="updateStatus(${index})">Update</button>
</td>
</tr>
`;

tbody.innerHTML += row;

});

}

function updateStatus(index){

let input = document.getElementById("dist"+index);
let value = Number(input.value);

if(value<=0){
alert("Enter valid tons");
return;
}

schedules[index].distributed += value;

if(schedules[index].distributed >= schedules[index].tons){
schedules[index].status = "Delivered";
}

renderTable();

}

function generateReport(){

let totalTons = 0;
let totalDistributed = 0;
let totalCost = 0;

schedules.forEach(s=>{
totalTons += s.tons;
totalDistributed += s.distributed;
totalCost += s.cost;
});

let report = `
<p><b>Total Planned Tons:</b> ${totalTons}</p>
<p><b>Total Distributed Tons:</b> ${totalDistributed}</p>
<p><b>Total Cost:</b> $${totalCost}</p>
<p><b>Remaining Tons:</b> ${totalTons-totalDistributed}</p>
`;

document.getElementById("report").innerHTML = report;

}

</script>

</body>
</html>
